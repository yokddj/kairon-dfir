<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Kairon DFIR investigation workspace</title>
  <desc id="desc">Synthetic screenshot of the Kairon DFIR investigation workspace with case overview, evidence indexing, search, artifacts, findings, and timeline panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#15211d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17232d"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#8fd694"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: url(#panel); stroke: #263542; stroke-width: 1; }
      .panel2 { fill: #111b24; stroke: #263542; stroke-width: 1; }
      .muted { fill: #8ca3b3; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #e7f0f5; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .accentText { fill: #8fd694; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .blueText { fill: #7dd3fc; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace; letter-spacing: .08em; }
      .small { font-size: 18px; }
      .tiny { font-size: 14px; }
      .label { font-size: 13px; text-transform: uppercase; }
      .h1 { font-size: 44px; font-weight: 760; }
      .h2 { font-size: 24px; font-weight: 720; }
      .h3 { font-size: 19px; font-weight: 700; }
      .num { font-size: 30px; font-weight: 760; }
      .pill { fill: #142632; stroke: #2e4856; stroke-width: 1; }
      .ok { fill: #123125; stroke: #2f6f55; stroke-width: 1; }
      .warn { fill: #332712; stroke: #735925; stroke-width: 1; }
      .line { stroke: #2a3b48; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>
  <rect x="44" y="36" width="1352" height="828" rx="28" fill="#0b1219" stroke="#243340" filter="url(#shadow)"/>

  <rect x="44" y="36" width="250" height="828" rx="28" fill="#0d1720"/>
  <rect x="82" y="76" width="44" height="44" rx="12" fill="url(#accent)"/>
  <text class="text h2" x="140" y="106">Kairon DFIR</text>
  <text class="muted tiny mono" x="82" y="154">LOCAL-FIRST BETA</text>

  <rect class="pill" x="82" y="195" width="174" height="38" rx="19"/>
  <text class="blueText small" x="106" y="220">Cases</text>
  <text class="muted small" x="106" y="280">Evidence</text>
  <text class="muted small" x="106" y="330">Search</text>
  <text class="muted small" x="106" y="380">Artifact Views</text>
  <text class="muted small" x="106" y="430">Findings</text>
  <text class="muted small" x="106" y="480">Reports</text>
  <line class="line" x1="82" y1="532" x2="256" y2="532"/>
  <text class="muted tiny mono" x="82" y="575">PRIVATE LAB</text>
  <text class="text small" x="82" y="610">Analyst workspace</text>
  <text class="muted tiny" x="82" y="640">Synthetic onboarding view</text>

  <text class="muted label mono" x="334" y="94">Investigation Home</text>
  <text class="text h1" x="334" y="146">Incident Review Workspace</text>
  <text class="muted small" x="334" y="180">Centralize evidence, index artifacts, triage activity, and build findings.</text>

  <rect class="ok" x="1120" y="82" width="218" height="44" rx="22"/>
  <text class="accentText small" x="1146" y="110">Evidence ready</text>
  <rect class="pill" x="1120" y="138" width="218" height="44" rx="22"/>
  <text class="blueText small" x="1146" y="166">Search this evidence</text>

  <g>
    <rect class="panel" x="334" y="224" width="290" height="118" rx="18"/>
    <text class="muted label mono" x="360" y="262">Indexed docs</text>
    <text class="text num" x="360" y="306">19,624</text>
    <text class="accentText tiny" x="360" y="328">Investigation ready</text>
  </g>
  <g>
    <rect class="panel" x="650" y="224" width="290" height="118" rx="18"/>
    <text class="muted label mono" x="676" y="262">Artifacts</text>
    <text class="text num" x="676" y="306">145 / 145</text>
    <text class="accentText tiny" x="676" y="328">No critical errors</text>
  </g>
  <g>
    <rect class="panel" x="966" y="224" width="344" height="118" rx="18"/>
    <text class="muted label mono" x="992" y="262">Warnings</text>
    <text class="text num" x="992" y="306">Empty logs</text>
    <text class="muted tiny" x="992" y="328">No-record EVTX files are informational</text>
  </g>

  <rect class="panel" x="334" y="374" width="610" height="206" rx="20"/>
  <text class="muted label mono" x="360" y="414">Investigation indexing</text>
  <text class="text h2" x="360" y="450">Evidence ready with warnings</text>
  <text class="muted small" x="360" y="484">Recommended indexing prepared core Windows artifacts for triage.</text>
  <rect class="ok" x="360" y="514" width="160" height="40" rx="20"/>
  <text class="accentText tiny" x="383" y="540">Search evidence</text>
  <rect class="pill" x="536" y="514" width="150" height="40" rx="20"/>
  <text class="blueText tiny" x="559" y="540">View artifacts</text>
  <rect class="pill" x="702" y="514" width="142" height="40" rx="20"/>
  <text class="blueText tiny" x="731" y="540">Timeline</text>

  <rect class="panel" x="972" y="374" width="338" height="206" rx="20"/>
  <text class="muted label mono" x="998" y="414">Index selected artifact types</text>
  <text class="text h3" x="998" y="448">Focused parsing</text>
  <text class="muted tiny" x="998" y="478">Choose specific artifact families when a targeted parse is needed.</text>
  <rect class="pill" x="998" y="506" width="74" height="32" rx="16"/>
  <text class="blueText tiny" x="1016" y="527">EVTX</text>
  <rect class="pill" x="1084" y="506" width="108" height="32" rx="16"/>
  <text class="blueText tiny" x="1102" y="527">Shimcache</text>
  <rect class="pill" x="1204" y="506" width="80" height="32" rx="16"/>
  <text class="blueText tiny" x="1224" y="527">Services</text>

  <rect class="panel" x="334" y="612" width="302" height="202" rx="20"/>
  <text class="muted label mono" x="360" y="652">Search</text>
  <text class="text h3" x="360" y="686">High-signal activity</text>
  <line class="line" x1="360" y1="714" x2="600" y2="714"/>
  <text class="muted tiny" x="360" y="744">powershell.exe · encoded command</text>
  <text class="muted tiny" x="360" y="774">service install · persistence</text>

  <rect class="panel" x="668" y="612" width="302" height="202" rx="20"/>
  <text class="muted label mono" x="694" y="652">Artifact Views</text>
  <text class="text h3" x="694" y="686">Execution &amp; persistence</text>
  <line class="line" x1="694" y1="714" x2="934" y2="714"/>
  <text class="muted tiny" x="694" y="744">Shimcache · 138 entries</text>
  <text class="muted tiny" x="694" y="774">Services · 181 records</text>

  <rect class="panel" x="1002" y="612" width="308" height="202" rx="20"/>
  <text class="muted label mono" x="1028" y="652">Findings &amp; Timeline</text>
  <text class="text h3" x="1028" y="686">Build the report</text>
  <line class="line" x1="1028" y1="714" x2="1274" y2="714"/>
  <text class="muted tiny" x="1028" y="744">Promote evidence into findings</text>
  <text class="muted tiny" x="1028" y="774">Export Markdown after review</text>
</svg>
