services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: -Xms${OPENSEARCH_JAVA_HEAP:-2g} -Xmx${OPENSEARCH_JAVA_HEAP:-2g}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      SERVER_HOST: "0.0.0.0"
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${BACKEND_UVICORN_WORKERS:-1}"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
    command: ["python", "-m", "app.workers.worker"]

  memory-worker:
    profiles:
      - memory
    build:
      context: .
      dockerfile: docker/memory-worker/Dockerfile
      args:
        VOLATILITY3_VERSION: ${VOLATILITY3_VERSION:-2.28.0}
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_WORKER_MODE: dedicated_worker
      MEMORY_TASK_QUEUE: ${MEMORY_TASK_QUEUE:-memory}
      MEMORY_REQUIRE_DEDICATED_WORKER: "true"
      MEMORY_WORKER_CONCURRENCY: ${MEMORY_WORKER_CONCURRENCY:-1}
      MEMORY_OUTPUT_DIR: /app/memory-output
      VOLATILITY3_COMMAND: vol
      XDG_CACHE_HOME: /volatility-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data/evidence:/app/data/evidence:ro
      - ./data/memory-output:/app/memory-output
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
      - memory-symbol-cache:/volatility-cache
    command: ["python", "-m", "app.workers.memory_worker"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /app/data/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  postgres_data:
  opensearch_data:
  memory-symbol-cache:
