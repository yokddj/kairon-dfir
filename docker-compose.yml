services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # postgres is also reachable from the symbol-internal network so the
    # symbol-fetcher can record MemorySymbolAcquisition rows without
    # traversing the default network.
    networks:
      - default
      - symbol-internal

  redis:
    image: redis:7-alpine
    # redis is also reachable from the symbol-internal network so the
    # symbol-fetcher can pick up tasks from the memory-symbols queue.
    networks:
      - default
      - symbol-internal

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: -Xms${OPENSEARCH_JAVA_HEAP:-2g} -Xmx${OPENSEARCH_JAVA_HEAP:-2g}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      SERVER_HOST: "0.0.0.0"
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
      - memory-symbol-cache:/volatility-cache:ro
      - ./operator-symbol-import:/operator-symbol-import:ro
    environment:
      MEMORY_SYMBOL_CACHE_ROOT: /volatility-cache/volatility3
      KAIRON_CLI_OPERATOR_ROOTS: /operator-symbol-import
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${BACKEND_UVICORN_WORKERS:-1}"]
    group_add:
      - "${MEMORY_EVIDENCE_SHARED_GID:-10001}"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
    command: ["python", "-m", "app.workers.worker"]

  memory-worker:
    profiles:
      - memory
    build:
      context: .
      dockerfile: docker/memory-worker/Dockerfile
      args:
        VOLATILITY3_VERSION: ${VOLATILITY3_VERSION:-2.28.0}
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_WORKER_MODE: dedicated_worker
      MEMORY_TASK_QUEUE: ${MEMORY_TASK_QUEUE:-memory}
      MEMORY_REQUIRE_DEDICATED_WORKER: "true"
      MEMORY_WORKER_CONCURRENCY: ${MEMORY_WORKER_CONCURRENCY:-1}
      MEMORY_OUTPUT_DIR: /app/memory-output
      VOLATILITY3_COMMAND: vol
      XDG_CACHE_HOME: /volatility-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data/evidence:/app/data/evidence:ro
      - ./data/memory-output:/app/memory-output
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
      - memory-symbol-cache:/volatility-cache
    command: ["python", "-m", "app.workers.memory_worker"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /app/data/tmp
      - /usr/local/lib/python3.12/site-packages/volatility3/symbols/windows
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    group_add:
      - "${MEMORY_EVIDENCE_SHARED_GID:-10001}"

  experimental-worker:
    profiles:
      - experimental
    build:
      context: .
      dockerfile: docker/memory-worker/Dockerfile
      args:
        VOLATILITY3_VERSION: ${VOLATILITY3_VERSION:-2.28.0}
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_WORKER_MODE: dedicated_worker
      MEMORY_EXPERIMENTAL_TASK_QUEUE: memory-experimental
      MEMORY_TASK_QUEUE: ${MEMORY_TASK_QUEUE:-memory}
      MEMORY_REQUIRE_DEDICATED_WORKER: "true"
      MEMORY_OUTPUT_DIR: /app/memory-output
      VOLATILITY3_COMMAND: vol
      XDG_CACHE_HOME: /tmp/volatility-cache
      KAIRON_WORKER_ID: experimental-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data/evidence:/app/data/evidence:ro
      - ./data/memory-output:/app/memory-output
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
      - ./data/experimental-symbol-cache:/app/data/experimental-symbol-cache:ro
    command: ["python", "-m", "app.workers.experimental_worker"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /app/data/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.config import get_settings; import sys; sys.exit(0 if get_settings().memory_experimental_queue_name == 'memory-experimental' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    user: "10001:10001"
    group_add:
      - "${MEMORY_EVIDENCE_SHARED_GID:-10001}"

  memory-native-probe-worker:
    profiles:
      - native-probe
    build:
      context: .
      dockerfile: docker/memory-worker/Dockerfile
      args:
        VOLATILITY3_VERSION: ${VOLATILITY3_VERSION:-2.28.0}
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_WORKER_MODE: dedicated_worker
      MEMORY_TASK_QUEUE: ${MEMORY_NATIVE_PROBE_TASK_QUEUE:-memory-native-probe}
      MEMORY_REQUIRE_DEDICATED_WORKER: "true"
      MEMORY_NATIVE_PROBE_TASK_QUEUE: ${MEMORY_NATIVE_PROBE_TASK_QUEUE:-memory-native-probe}
      MEMORY_OUTPUT_DIR: /app/memory-output
      VOLATILITY3_COMMAND: vol
      XDG_CACHE_HOME: /volatility-cache
      KAIRON_WORKER_ID: native-probe-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    volumes:
      - ./data/evidence:/app/data/evidence:ro
      - ./data/memory-output:/app/memory-output
      - ./data/local-mounts/mnt-evidence:/mnt/evidence:ro
      - ./data/local-mounts/data-evidence:/data/evidence:ro
      - ./data/local-mounts/cases:/cases:ro
      - memory-symbol-cache:/volatility-cache
    command: ["python", "-m", "app.workers.native_probe_worker"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /app/data/tmp
      - /usr/local/lib/python3.12/site-packages/volatility3/symbols/windows
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    group_add:
      - "${MEMORY_EVIDENCE_SHARED_GID:-10001}"

  symbol-fetcher:
    profiles:
      - memory-symbols
    build:
      context: .
      dockerfile: docker/symbol-fetcher/Dockerfile
      args:
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_SYMBOL_TASK_QUEUE: ${MEMORY_SYMBOL_TASK_QUEUE:-memory-symbols}
      MEMORY_SYMBOL_CACHE_ROOT: /volatility-cache/volatility3
      MEMORY_SYMBOL_EGRESS_GATEWAY_URL: ${MEMORY_SYMBOL_EGRESS_GATEWAY_URL:-http://symbol-egress-gateway:8443}
      BACKEND_DATA_DIR: /app/data/tmp/runtime
      BACKEND_TEMP_DIR: /app/data/tmp
      KAIRON_WORKER_ID: symbol-fetcher
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      symbol-egress-gateway:
        condition: service_started
    volumes:
      - memory-symbol-cache:/volatility-cache
    command: ["python", "-m", "app.workers.symbol_fetcher"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/data/tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    # The fetcher is restricted to internal-only networks.  It cannot
    # reach the Internet directly; the symbol-egress-gateway is the only
    # outbound path.  Application-level policy remains a defense in depth.
    # symbol-fetcher-channel is the dedicated link to the gateway.
    # symbol-internal hosts postgres/redis for DB and queue access.
    networks:
      - symbol-internal
      - symbol-fetcher-channel

  symbol-egress-gateway:
    profiles:
      - memory-symbols
    build:
      context: .
      dockerfile: docker/symbol-egress-gateway/Dockerfile
      args:
        KAIRON_COMMIT: ${KAIRON_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    env_file:
      - .env
    environment:
      MEMORY_SYMBOL_EGRESS_GATEWAY_SECRET: ${MEMORY_SYMBOL_EGRESS_GATEWAY_SECRET}
      MEMORY_SYMBOL_EGRESS_GATEWAY_PORT: "8443"
      MEMORY_SYMBOL_INITIAL_HOST: ${MEMORY_SYMBOL_INITIAL_HOST:-msdl.microsoft.com}
      MEMORY_SYMBOL_REDIRECT_SUFFIXES: ${MEMORY_SYMBOL_REDIRECT_SUFFIXES:-.blob.core.windows.net}
      MEMORY_SYMBOL_CONNECT_TIMEOUT_SECONDS: ${MEMORY_SYMBOL_CONNECT_TIMEOUT_SECONDS:-15}
      MEMORY_SYMBOL_DOWNLOAD_TIMEOUT_SECONDS: ${MEMORY_SYMBOL_DOWNLOAD_TIMEOUT_SECONDS:-180}
      MEMORY_SYMBOL_MAX_REDIRECTS: ${MEMORY_SYMBOL_MAX_REDIRECTS:-5}
      MEMORY_SYMBOL_DOWNLOAD_MAX_BYTES: ${MEMORY_SYMBOL_DOWNLOAD_MAX_BYTES:-1073741824}
      MEMORY_SYMBOL_EGRESS_REPLAY_WINDOW_SECONDS: ${MEMORY_SYMBOL_EGRESS_REPLAY_WINDOW_SECONDS:-60}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      KAIRON_WORKER_ID: symbol-egress-gateway
    command: ["python", "-m", "app.services.memory.symbol_egress_gateway"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    # The gateway is the only component on the symbol-egress network
    # (which has a default route).  It is also on the dedicated
    # symbol-fetcher-channel so the fetcher can reach it.  It is NOT
    # attached to symbol-internal (postgres/redis), so a compromised
    # gateway cannot pivot to the database.
    networks:
      - symbol-fetcher-channel
      - symbol-egress

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  postgres_data:
  opensearch_data:
  memory-symbol-cache:

networks:
  symbol-internal:
    driver: bridge
    internal: true
    labels:
      kairon.network.purpose: "symbol-fetcher, postgres, redis (no default route)"
  symbol-fetcher-channel:
    driver: bridge
    internal: true
    labels:
      kairon.network.purpose: "symbol-fetcher <-> symbol-egress-gateway only (no default route)"
  symbol-egress:
    driver: bridge
    labels:
      kairon.network.purpose: "symbol-egress-gateway outbound HTTPS only"
